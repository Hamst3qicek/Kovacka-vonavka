<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Montserrat:wght@500;700&display=swap%22 rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
  <main>
    <article class="card">
      <img
        class="card__image card__image--desktop"
        src="./images/image-product-desktop.jpg"
        alt="Gabrielle Chanel perfume bottle surrounded by green leaves"
      />
      <img
        class="card__image card__image--mobile"
        src="./images/image-product-mobile.jpg"
        alt="Gabrielle Chanel perfume bottle surrounded by green leaves"
      />
      <div class="card__content">
        <p class="card__category">Perfume</p>
        <h1 class="card__title">Gabrielle Essence Eau De Parfum</h1>
        <p class="card__description">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>
        <div class="card__pricing">
          <span class="card__price-current">$149.99</span>
          <span class="card__price-original">$169.99</span>
        </div>
        <button class="card__btn">
          <svg width="15" height="16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M14.191 4.153H3.43L2.977.982A.642.642 0 0 0 2.343.5H.98a.642.642 0 0 0 0 1.283h.84L3.35 12.17a1.923 1.923 0 1 0 2.278.512h4.23a1.923 1.923 0 1 0 2.152-.51l.235-1.031a.641.641 0 0 0-.624-.79H4.472l-.258-2.052h9.249a.641.641 0 0 0 .627-.507l.749-3.627a.642.642 0 0 0-.648-.012Z" fill="#FFF"/>
          </svg>
          Add to Cart
        </button>
      </div>
    </article>
  </main>
 
 
</body>
</html>
